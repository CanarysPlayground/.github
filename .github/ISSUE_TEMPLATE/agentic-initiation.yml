name: "🤖 Identity & Lifecycle Auditor"
description: "Hyper-efficient organization and profile metadata audit using live REST APIs."
title: "<Auto Generated>"

labels: ["status: audited", "source: enterprise-copilot"]
assignees: 
  - "$author" # Native GitHub shortcut: automatically assigns the issue creator
projects:
  - "orgs/CanarysPlayground/projects/356"

body:
  - type: markdown
    attributes:
      value: |
        *Cost-optimized automation route active.*

  - type: input
    id: hidden-context
    attributes:
      label: "System Audit Metadata"
      value: "Org: ${{ github.repository_owner }} | Auditor: @${{ github.actor }}"
    validations:
      required: true

  - type: textarea
    id: copilot-trigger
    attributes:
      label: "Optimized AI Formatting Field"
      value: |
        @copilot 
        1. Fetch JSON from: `https://github.com{{ github.repository_owner }}`
        2. Fetch JSON from: `https://github.com{{ github.actor }}`
        3. Rewrite the title bar to: `[AI Generated Issue]: ${{ github.repository_owner }} / @${{ github.actor }}`
        4. Reformat response profiles into clean Markdown grid tables below. Keep it concise.
    validations:
      required: true
